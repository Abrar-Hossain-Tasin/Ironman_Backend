server:
  port: ${PORT:8080}

spring:
  application:
    name: ironman-backend

  main:
    allow-circular-references: true

  datasource:
    url: ${SPRING_DATASOURCE_URL:${SUPABASE_DB_URL:jdbc:postgresql://localhost:5432/ironman}}
    username: ${SPRING_DATASOURCE_USERNAME:${SUPABASE_DB_USERNAME:postgres}}
    password: ${SPRING_DATASOURCE_PASSWORD:${SUPABASE_DB_PASSWORD:postgres}}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: Asia/Dhaka

  # ── Async thread pool (for EmailService) ────────────────────────────────────
  task:
    execution:
      pool:
        core-size: 2
        max-size: 5
        queue-capacity: 100

app:
  jwt:
    secret: ${JWT_SECRET:dev-secret-for-local-only-change-in-production-make-sure-it-is-long-enough}
    access-token-minutes: ${JWT_ACCESS_TOKEN_MINUTES:60}
    refresh-token-days: ${JWT_REFRESH_TOKEN_DAYS:14}
  cors:
    allowed-origins: ${ALLOWED_ORIGINS:http://localhost:3000}
  auth:
    cookies:
      secure: ${AUTH_COOKIE_SECURE:false}
      same-site: ${AUTH_COOKIE_SAME_SITE:Lax}
  timezone: Asia/Dhaka
  mail:
    enabled: ${MAIL_ENABLED:false}
    from: ${MAIL_FROM:noreply@ironman-laundry.com}
    api-key: ${RESEND_API_KEY:}
  sms:
    enabled: ${SMS_ENABLED:false}
  push:
    enabled: ${PUSH_ENABLED:false}
  payments:
    webhook-secret: ${PAYMENT_WEBHOOK_SECRET:}
    webhooks:
      signature-tolerance: ${PAYMENT_WEBHOOK_SIGNATURE_TOLERANCE:PT5M}
      max-attempts: ${PAYMENT_WEBHOOK_MAX_ATTEMPTS:6}
      retry-base-delay: ${PAYMENT_WEBHOOK_RETRY_BASE_DELAY:PT5M}
      retry-fixed-delay-ms: ${PAYMENT_WEBHOOK_RETRY_FIXED_DELAY_MS:60000}
      providers:
        bkash:
          secret: ${PAYMENT_WEBHOOK_BKASH_SECRET:${PAYMENT_WEBHOOK_SECRET:}}
          signature-header: X-BKash-Signature
          timestamp-header: X-BKash-Timestamp
          event-id-header: X-BKash-Event-Id
          idempotency-header: X-BKash-Idempotency-Key
        nagad:
          secret: ${PAYMENT_WEBHOOK_NAGAD_SECRET:${PAYMENT_WEBHOOK_SECRET:}}
          signature-header: X-Nagad-Signature
          timestamp-header: X-Nagad-Timestamp
          event-id-header: X-Nagad-Event-Id
          idempotency-header: X-Nagad-Idempotency-Key
        rocket:
          secret: ${PAYMENT_WEBHOOK_ROCKET_SECRET:${PAYMENT_WEBHOOK_SECRET:}}
          signature-header: X-Rocket-Signature
          timestamp-header: X-Rocket-Timestamp
          event-id-header: X-Rocket-Event-Id
          idempotency-header: X-Rocket-Idempotency-Key
        card:
          secret: ${PAYMENT_WEBHOOK_CARD_SECRET:${PAYMENT_WEBHOOK_SECRET:}}
          signature-header: X-Card-Signature
          timestamp-header: X-Card-Timestamp
          event-id-header: X-Card-Event-Id
          idempotency-header: X-Card-Idempotency-Key
  slots:
    # Default capacity per slot. Override per-slot via SLOT_CAPACITY_DEFAULT or
    # by extending this map. Slots list is the source of truth for the order
    # wizard — adding a row here makes it pickable.
    capacity-default: ${SLOT_CAPACITY_DEFAULT:20}
    pickup:
      - "10:00-12:00"
      - "14:00-18:00"
      - "18:00-20:00"
    delivery:
      - "10:00-12:00"
      - "14:00-18:00"
      - "18:00-20:00"
  branding:
    name: ${BRAND_NAME:Ironman Laundry}
    tagline: ${BRAND_TAGLINE:Premium laundry, delivered.}
    theme-color: ${THEME_COLOR:#F5A623}
    logo-url: ${BRAND_LOGO_URL:}
    company-address: ${BRAND_ADDRESS:Dhaka, Bangladesh}
    contact-phone: ${BRAND_PHONE:+880 1700 000000}
    contact-email: ${BRAND_EMAIL:support@ironman-laundry.com}
    website: ${BRAND_WEBSITE:https://ironman-laundry.com}

springdoc:
  api-docs:
    enabled: true

sentry:
  dsn: ${SENTRY_DSN:}
  environment: ${SENTRY_ENVIRONMENT:${SPRING_PROFILES_ACTIVE:local}}
  traces-sample-rate: ${SENTRY_TRACES_SAMPLE_RATE:0.10}
  send-default-pii: false
