server:
  port: ${PORT:8080}

spring:
  application:
    name: ironman-backend
  datasource:
    url: ${SUPABASE_DB_URL:jdbc:postgresql://localhost:5432/ironman}
    username: ${SUPABASE_DB_USERNAME:postgres}
    password: ${SUPABASE_DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: Asia/Dhaka

app:
  jwt:
    secret: ${JWT_SECRET:dev-secret-for-local-only-change-in-production}
    access-token-minutes: ${JWT_ACCESS_TOKEN_MINUTES:60}
    refresh-token-days: ${JWT_REFRESH_TOKEN_DAYS:14}
  cors:
    allowed-origins: ${ALLOWED_ORIGINS:http://localhost:3000}
  timezone: Asia/Dhaka

springdoc:
  api-docs:
    enabled: true
