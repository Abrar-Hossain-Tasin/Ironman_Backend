server:
  port: ${PORT:8081}

spring:
  application:
    name: ironman-backend
  
  # FIX: Allow circular references (fixes the JwtAuthenticationFilter <-> SecurityConfig error)
  main:
    allow-circular-references: true

  datasource:
    # Updated with your Supabase credentials as defaults
    url: ${SUPABASE_DB_URL:jdbc:postgresql://aws-1-ap-northeast-2.pooler.supabase.com:5432/postgres?sslmode=require}
    username: ${SUPABASE_DB_USERNAME:postgres.tghdngtupwuqvljmzjxn}
    password: ${SUPABASE_DB_PASSWORD:ironmanAbrar9462}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: Asia/Dhaka

app:
  jwt:
    # IMPORTANT: Ensure this matches the secret used in your frontend/other services
    secret: ${JWT_SECRET:dev-secret-for-local-only-change-in-production-make-sure-it-is-long-enough}
    access-token-minutes: ${JWT_ACCESS_TOKEN_MINUTES:60}
    refresh-token-days: ${JWT_REFRESH_TOKEN_DAYS:14}
  cors:
    allowed-origins: ${ALLOWED_ORIGINS:http://localhost:3000}
  timezone: Asia/Dhaka

springdoc:
  api-docs:
    enabled: true




